name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpam0g-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxrandr-dev

      - uses: oven-sh/setup-bun@v2

      - name: Build frontend
        run: |
          cd frontend
          bun install
          bunx webpack --mode production

      - name: Build
        run: go build -tags webkit2_41 ./...

      - name: Test
        run: go test -tags webkit2_41 -race ./...

      - name: Vet
        run: go vet -tags webkit2_41 ./...
